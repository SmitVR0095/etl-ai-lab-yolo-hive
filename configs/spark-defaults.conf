# Nombre de la aplicación
spark.app.name=etl-ai-lab

# Modo local: usa todos los cores disponibles
spark.master=local[*]

# Forzar sistema de archivos local y evitar HDFS localhost:9000
spark.hadoop.fs.defaultFS=file:///

# Particiones de shuffle: bajo para datasets pequeños
spark.sql.shuffle.partitions=4

# Memoria del driver y executor
spark.driver.memory=2g
spark.executor.memory=2g

# Compresión de archivos Parquet
spark.sql.parquet.compression.codec=snappy

# Logging reducido
spark.eventLog.enabled=false

# Tiempo máximo de espera para una tarea
spark.network.timeout=120s